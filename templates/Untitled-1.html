<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Logger</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@700&display=swap');
    
    body {
      font-family: 'Arial', sans-serif;
      background-color: #121212;
      color: #f5f5f5;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      background-color: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }
    h1 {
      text-align: center;
      font-size: 3rem;
      font-family: 'Raleway', sans-serif;
      background: linear-gradient(90deg, #e63946, #ffcc33);
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 30px;
    }
    .accordion-button {
      background-color: #2a2a2a;
      color: #f5f5f5;
      border: none;
    }
    .accordion-button:not(.collapsed) {
      background-color: #e63946;
      color: #fff;
    }
    .accordion-body {
      background-color: #333;
      color: #fff;
    }
    .exercises li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .exercises li span {
      margin-right: 10px;
    }
    .exercises li::before {
      content: "✔️";
      margin-right: 10px;
      color: #4caf50;
    }
    .btn-edit {
      background-color: #e63946;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 0.9rem;
      transition: background-color 0.3s ease;
    }
    .btn-edit:hover {
      background-color: #c22f3e;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      color: #b0b0b0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Workout Logger</h1>

    <div class="accordion" id="workoutAccordion">
      <!-- Giorno 1 -->
      <div class="accordion-item">
        <h2 class="accordion-header" id="headingOne">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
            Lunedì - 21 Ottobre
          </button>
        </h2>
        <div id="collapseOne" class="accordion-collapse collapse" aria-labelledby="headingOne" data-bs-parent="#workoutAccordion">
          <div class="accordion-body">
            <ul class="exercises list-unstyled">
              <li>
                <span>Push-up (3x12)</span>
                <span>Peso: 0 kg / Score: 12</span>
                <button class="btn-edit">Modifica</button>
              </li>
              <li>
                <span>Squat (3x15)</span>
                <span>Peso: 50 kg / Score: 15</span>
                <button class="btn-edit">Modifica</button>
              </li>
              <li>
                <span>Plank (2x60s)</span>
                <span>Score: 60s</span>
                <button class="btn-edit">Modifica</button>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Giorno 2 -->
      <div class="accordion-item">
        <h2 class="accordion-header" id="headingTwo">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
            Martedì - 22 Ottobre
          </button>
        </h2>
        <div id="collapseTwo" class="accordion-collapse collapse" aria-labelledby="headingTwo" data-bs-parent="#workoutAccordion">
          <div class="accordion-body">
            <ul class="exercises list-unstyled">
              <li>
                <span>Corsa (5 km)</span>
                <span>Score: 25 min</span>
                <button class="btn-edit">Modifica</button>
              </li>
              <li>
                <span>Burpees (3x10)</span>
                <span>Score: 10</span>
                <button class="btn-edit">Modifica</button>
              </li>
              <li>
                <span>Affondi (3x12 per gamba)</span>
                <span>Peso: 20 kg / Score: 12</span>
                <button class="btn-edit">Modifica</button>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Aggiungi altri giorni qui -->
    </div>

    <footer>
      <p>Continua a spingere al massimo 💪</p>
    </footer>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
