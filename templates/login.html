{% extends "base.html" %} 
{% from 'bootstrap5/form.html' import render_form %}

{% block content %}
<div class="container text-center">
    <h1 class="text-center">Login</h1>
    <form method="POST" action="{{ url_for('login') }}">
        {{ form.csrf_token() }}
        {{ render_form(form) }}
    </form>
    <a href="{{ url_for('register') }}" class="btn btn-add-workout btn-block mt-3">Registrati</a>
</div>
{% endblock %}
