{% extends "base.html" %} 
{% from 'bootstrap5/form.html' import render_form %}

{% block content %}
<div class="container text-center">
    <h1 class="text-center">Profile</h1>
    <form method="POST" action="{{ url_for('profile') }}">
        {{ form.csrf_token() }}
        {{ render_form(form) }}
    </form>
</div>


<!-- Barra in basso per aggiungere workout -->
<div class="bottom-bar">
    <a class="btn btn-outline-primary btn-block" href="{{ url_for('dashboard') }}" role="button" aria-expanded="false">Dashboard</a>
</div>
{% endblock %}
