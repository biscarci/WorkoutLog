
<style>
    .input-container {
        margin-bottom: 20px;
    }
    input, select {
        padding: 10px;
        margin: 5px;
        width: 80px;
    }
    table {
        margin: 20px auto;
        border-collapse: collapse;
        width: 80%;
    }
</style>

<h1>1RM Calculator</h1>
<div class="container mt-4 text-center">
    <!-- Weight Input -->
    <div class="row align-items-center mb-3">
        <div class="col-12 col-md-6">
            <h5>Weight Lifted</h5>
        </div>
        <div class="col-12 col-md-6 d-flex align-items-center">
            <button class="btn btn-outline-warning btn-arrow me-2" onclick="decreaseValue('weight', 1)">
                <i class="bi bi-chevron-left"></i>
            </button>
            <input type="number" id="weight" class="form-control text-center" placeholder="Weight (kg)" value="100" min="0" style="max-width: 100px;">
            <button class="btn btn-outline-warning btn-arrow ms-2" onclick="increaseValue('weight', 1)">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Reps Input -->
    <div class="row align-items-center mb-3">
        <div class="col-12 col-md-6">
            <h5>Reps</h5>
        </div>
        <div class="col-12 col-md-6 d-flex align-items-center">
            <button class="btn btn-outline-warning btn-arrow me-2" onclick="decreaseValue('reps', 1)">
                <i class="bi bi-dash"></i>
            </button>
            <input type="number" id="reps" class="form-control text-center" placeholder="Reps" value="1" min="1" style="max-width: 100px;">
            <button class="btn btn-outline-warning btn-arrow ms-2" onclick="increaseValue('reps', 1)">
                <i class="bi bi-plus"></i>
            </button>
        </div>
    </div>

    <!-- Calculate Button -->
    <div class="row">
        <div class="col text-center">
            <button class="btn btn-add-workout" onclick="calculate()">Calculate</button>
        </div>
    </div>
</div>

<div id="tables" class="container mt-4 d-none">
    <div class="row">
        <!-- Prima Tabella -->
        <div class="col-12 col-md-6">
            <table id="rm_table_1" class="table table-bordered text-center table-dark">
                <thead>
                    <tr>
                        <th>RM</th>
                        <th>Est. One Rep Max</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Righe dinamiche -->
                </tbody>
            </table>
        </div>

        <!-- Seconda Tabella -->
        <div class="col-12 col-md-6">
            <table id="rm_table_2" class="table table-bordered table-dark text-center">
                <thead>
                    <tr>
                        <th>RM</th>
                        <th>% One Rep Max</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Righe dinamiche -->
                </tbody>
            </table>
        </div>
    </div>
</div>



<script>
    // Funzioni per incrementare e decrementare i valori
    function increaseValue(id, step) {
            const element = document.getElementById(id);
            const value = parseInt(element.value) || 0;
            element.value = value + step;
        }

        function decreaseValue(id, step) {
            const element = document.getElementById(id);
            const value = parseInt(element.value) || 0;
            element.value = Math.max(value - step, element.min || 0);
        }

    // Calculate and update table
  
    function calculate() {
        document.getElementById('tables').classList.remove('d-none');

        // Ottieni input utente
        const weight = parseFloat(document.getElementById("weight").value);
        const reps = parseInt(document.getElementById("reps").value, 10);

        // Validazione input
        if (isNaN(weight) || weight <= 0 || isNaN(reps) || reps <= 0) {
            alert("Please enter a valid weight and reps.");
            return;
        }

        // Calcola il valore 1RM usando la formula
        const rm = weight / (1.0278 - (0.0278 * reps));

        // Percentuali per calcolare i valori da 1RM a 10RM
        const rMs_label = ["1RM", "2RM", "3RM", "4RM", "5RM", "6RM", "7RM", "8RM", "9RM", "10RM","11RM","12RM","15RM"];
        const rMs_perc = [1.00, 0.94, 0.91333, 0.88666, 0.86666, 0.84666, 0.82, 0.80, 0.78, 0.7666, 0.746666, 0.72666, 0.68];

        // Seleziona la tabella e svuota il contenuto esistente
        const tableBody = document.getElementById("rm_table_1").getElementsByTagName('tbody')[0];
        tableBody.innerHTML = ""; // Rimuove tutte le righe precedenti
        // Crea dinamicamente le righe della tabella
        rMs_label.forEach((label, index) => {
            const row = tableBody.insertRow(); // Crea una nuova riga
            const labelCell = row.insertCell(0); // Prima cella: etichetta (es. "1RM")
            labelCell.textContent = label;
            const valueCell = row.insertCell(1); // Seconda cella: valore calcolato
            const rmValue = (rMs_perc[index] * rm).toFixed(0); // Calcola il valore e lo arrotonda
            valueCell.textContent = `${rmValue} Kg`;
        });

        const tableBody2 = document.getElementById("rm_table_2").getElementsByTagName('tbody')[0];
        tableBody2.innerHTML = ""; // Rimuove tutte le righe precedenti */

        // Crea dinamicamente le righe della tabella
        for (let index = 1; index <= 13; index++) {
            const percent = 100-5*index;
            const row = tableBody2.insertRow(); // Crea una nuova riga
            const labelCell = row.insertCell(0); // Prima cella: etichetta (es. "1RM")
            labelCell.textContent =  `${percent}%`;;
            const valueCell = row.insertCell(1); // Seconda cella: valore calcolato
            const rmValue = (Math.floor(0.01*rm*percent)).toFixed(0); // Calcola il valore e lo arrotonda
            valueCell.textContent = `${rmValue} Kg`; 
        }
    
    }
</script>
