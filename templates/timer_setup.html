{% extends "base.html" %}

{% block content %}
<div class="container my-4">
  <h4 class="text-center fw-bold mb-1">{{ workout.name }}</h4>
  <p class="text-center text-secondary small mb-4" style="letter-spacing:0.05em;">Seleziona il tipo di timer</p>

  <!-- Type buttons -->
  <div class="row g-2 mb-4">
    <div class="col-6">
      <button class="btn btn-outline-primary w-100 py-3 type-btn fw-bold" data-type="AMRAP"
              style="font-size:1.1rem; letter-spacing:0.08em;">AMRAP</button>
    </div>
    <div class="col-6">
      <button class="btn btn-outline-primary w-100 py-3 type-btn fw-bold" data-type="FOR TIME"
              style="font-size:1.1rem; letter-spacing:0.08em;">FOR TIME</button>
    </div>
    <div class="col-6">
      <button class="btn btn-outline-primary w-100 py-3 type-btn fw-bold" data-type="EMOM"
              style="font-size:1.1rem; letter-spacing:0.08em;">EMOM</button>
    </div>
    <div class="col-6">
      <button class="btn btn-outline-primary w-100 py-3 type-btn fw-bold" data-type="TABATA"
              style="font-size:1.1rem; letter-spacing:0.08em;">TABATA</button>
    </div>
  </div>

  <!-- Config panels -->
  <div id="config-panel" style="display:none;">

    <!-- AMRAP -->
    <div id="config-AMRAP" class="config-section" style="display:none;">
      <p class="text-secondary small mb-2">Aggiungi uno o più AMRAP, con eventuali pause tra di essi.</p>
      <div id="amrap-segments" class="mb-2"></div>
      <div class="d-flex gap-2 mt-1">
        <button type="button" class="btn btn-action flex-grow-1" onclick="addAmrap()">+ AMRAP</button>
        <button type="button" class="btn btn-action flex-grow-1" onclick="addRest('amrap-segments')">+ Pausa</button>
      </div>
    </div>

    <!-- FOR TIME -->
    <div id="config-FOR TIME" class="config-section" style="display:none;">
      <div class="mb-3">
        <label class="form-label">Time cap (minuti)</label>
        <input type="number" id="fortime-cap" class="form-control" min="1" max="180" value="20">
      </div>
    </div>

    <!-- EMOM -->
    <div id="config-EMOM" class="config-section" style="display:none;">
      <p class="text-secondary small mb-2">Aggiungi uno o più blocchi EMOM, con eventuali pause tra di essi.</p>
      <div id="emom-segments" class="mb-2"></div>
      <div class="d-flex gap-2 mt-1">
        <button type="button" class="btn btn-action flex-grow-1" onclick="addEmom()">+ EMOM</button>
        <button type="button" class="btn btn-action flex-grow-1" onclick="addRest('emom-segments')">+ Pausa</button>
      </div>
    </div>

    <!-- TABATA -->
    <div id="config-TABATA" class="config-section" style="display:none;">
      <div class="mb-3">
        <label class="form-label">Serie</label>
        <input type="number" id="tabata-rounds" class="form-control" min="1" max="100" value="8">
      </div>
      <div class="mb-3">
        <label class="form-label">Lavoro (secondi)</label>
        <input type="number" id="tabata-work" class="form-control" min="5" max="300" value="20">
      </div>
      <div class="mb-3">
        <label class="form-label">Riposo (secondi)</label>
        <input type="number" id="tabata-rest" class="form-control" min="5" max="300" value="10">
      </div>
    </div>

    <!-- Start -->
    <div class="d-grid mt-4">
      <button type="button" class="btn btn-outline-primary py-3 fw-bold" onclick="startWorkout()"
              style="font-size:1.2rem; letter-spacing:0.12em;">
        AVVIA TIMER
      </button>
    </div>
  </div>
</div>

<div class="bottom-bar text-center py-3">
  <a class="btn btn-outline-primary" href="{{ url_for('add_performance', id=workout.id) }}">Indietro</a>
</div>

<script>
(function () {
  let selectedType = null;
  let amrapIdx = 0;
  let emomIdx = 0;

  document.querySelectorAll('.type-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      selectedType = this.dataset.type;

      document.querySelectorAll('.type-btn').forEach(function (b) {
        b.style.backgroundColor = '';
        b.style.color = '';
      });
      this.style.backgroundColor = '#fff';
      this.style.color = '#000';

      document.querySelectorAll('.config-section').forEach(function (s) {
        s.style.display = 'none';
      });
      const panel = document.getElementById('config-' + selectedType);
      if (panel) panel.style.display = 'block';
      document.getElementById('config-panel').style.display = 'block';
    });
  });

  window.addAmrap = function () {
    amrapIdx++;
    const container = document.getElementById('amrap-segments');
    const div = document.createElement('div');
    div.className = 'segment-item d-flex align-items-center gap-2 mb-2';
    div.dataset.segtype = 'amrap';
    div.innerHTML =
      '<span class="badge bg-white text-black fw-bold px-2 py-1" style="white-space:nowrap;min-width:72px;">AMRAP ' + amrapIdx + '</span>' +
      '<input type="number" class="form-control seg-value" placeholder="min" min="1" max="180" value="10" style="max-width:90px;">' +
      '<span class="text-secondary small">min</span>' +
      '<button type="button" class="btn btn-delete btn-sm px-2 ms-auto" onclick="removeSegment(this)">✕</button>';
    container.appendChild(div);
  };

  window.addEmom = function () {
    emomIdx++;
    const container = document.getElementById('emom-segments');
    const div = document.createElement('div');
    div.className = 'segment-item mb-2 p-2';
    div.dataset.segtype = 'emom';
    div.style.cssText = 'border:1px solid #444;border-radius:6px;';
    div.innerHTML =
      '<div class="d-flex align-items-center gap-2 flex-wrap">' +
        '<span class="badge bg-white text-black fw-bold px-2 py-1" style="white-space:nowrap;min-width:72px;">EMOM ' + emomIdx + '</span>' +
        '<span class="text-secondary small">ogni</span>' +
        '<input type="number" class="form-control seg-interval" placeholder="X" min="1" max="10" value="1" style="max-width:60px;">' +
        '<span class="text-secondary small">min ×</span>' +
        '<input type="number" class="form-control seg-rounds" placeholder="Y" min="1" max="100" value="10" style="max-width:70px;">' +
        '<span class="text-secondary small">rounds</span>' +
        '<button type="button" class="btn btn-delete btn-sm px-2 ms-auto" onclick="removeSegment(this)">✕</button>' +
      '</div>';
    container.appendChild(div);
  };

  window.addRest = function (containerId) {
    const container = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 'segment-item d-flex align-items-center gap-2 mb-2';
    div.dataset.segtype = 'rest';
    div.innerHTML =
      '<span class="badge text-secondary fw-bold px-2 py-1" style="white-space:nowrap;min-width:72px;border:1px solid #555;">RIPOSO</span>' +
      '<input type="number" class="form-control seg-value" placeholder="sec" min="5" max="3600" value="60" style="max-width:90px;">' +
      '<span class="text-secondary small">sec</span>' +
      '<button type="button" class="btn btn-delete btn-sm px-2 ms-auto" onclick="removeSegment(this)">✕</button>';
    container.appendChild(div);
  };

  window.removeSegment = function (btn) {
    btn.closest('.segment-item').remove();
  };

  window.startWorkout = function () {
    if (!selectedType) {
      alert('Seleziona un tipo di timer');
      return;
    }

    var config = { type: selectedType };

    if (selectedType === 'AMRAP') {
      var segs = [];
      document.querySelectorAll('#amrap-segments .segment-item').forEach(function (item) {
        if (item.dataset.segtype === 'amrap') {
          segs.push({ type: 'amrap', duration: (parseInt(item.querySelector('.seg-value').value) || 10) * 60 });
        } else {
          segs.push({ type: 'rest', duration: parseInt(item.querySelector('.seg-value').value) || 60 });
        }
      });
      if (!segs.some(function (s) { return s.type === 'amrap'; })) {
        alert('Aggiungi almeno un blocco AMRAP');
        return;
      }
      config.segments = segs;

    } else if (selectedType === 'FOR TIME') {
      config.cap = parseInt(document.getElementById('fortime-cap').value) || 20;

    } else if (selectedType === 'EMOM') {
      var segs = [];
      document.querySelectorAll('#emom-segments .segment-item').forEach(function (item) {
        if (item.dataset.segtype === 'emom') {
          segs.push({
            type: 'emom',
            interval: (parseInt(item.querySelector('.seg-interval').value) || 1) * 60,
            rounds: parseInt(item.querySelector('.seg-rounds').value) || 10
          });
        } else {
          segs.push({ type: 'rest', duration: parseInt(item.querySelector('.seg-value').value) || 60 });
        }
      });
      if (!segs.some(function (s) { return s.type === 'emom'; })) {
        alert('Aggiungi almeno un blocco EMOM');
        return;
      }
      config.segments = segs;

    } else if (selectedType === 'TABATA') {
      config.rounds = parseInt(document.getElementById('tabata-rounds').value) || 8;
      config.work = parseInt(document.getElementById('tabata-work').value) || 20;
      config.rest = parseInt(document.getElementById('tabata-rest').value) || 10;
    }

    sessionStorage.setItem('timerConfig', JSON.stringify(config));
    window.location.href = '{{ url_for("workout_timer", id=workout.id) }}';
  };
})();
</script>
{% endblock %}
