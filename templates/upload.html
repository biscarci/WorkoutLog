{% extends "base.html" %} 
{% from 'bootstrap5/form.html' import render_form %}




{% block content %}


<div class="container">
    <h1 class="text-center">Carica un'immagine</h1>
    <form action="{{ url_for('upload_workout') }}" method="POST" enctype="multipart/form-data" class="mt-4">
        <div class="form-group">
            <label for="image">Seleziona un'immagine</label>
            <input type="file" class="form-control-file" id="image" name="file" accept="image/*" required>
        </div>
        <div class="text-center">
            <button type="submit" id="submit-button"  class="btn-add-workout mt-3">
                <span id="button-t  ext">Carica e Processa</span>
                <span id="loading-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
            </button>   
        </div>
    </form>
    
</div>

<!-- Barra in basso per aggiungere workout -->
<div class="bottom-bar">
    <a 
        class="btn btn-back btn-block" 
        href="{{ url_for('dashboard') }}" 
        role="button" aria-expanded="false" 
        >Dashboard</a>
</div>


<script>
    // Seleziona il pulsante tramite il suo ID
    const button = document.getElementById('submit-button');

    function handleClick() {
        console.log("ok")
        // Nasconde il testo e mostra il caricamento
        document.getElementById('button-text').classList.add('d-none');
        document.getElementById('loading-spinner').classList.remove('d-none');
        
        // Disabilita il pulsante per evitare clic multipli
        button.disabled = true;
    }
    button.onclick = handleClick;
</script>
{% endblock %}
